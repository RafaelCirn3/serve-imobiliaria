services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-serve}
      POSTGRES_USER: ${POSTGRES_USER:-serve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-serve}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serve} -d ${POSTGRES_DB:-serve}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: sh -c "python manage.py migrate && python manage.py seed && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: serve
      POSTGRES_USER: serve
      POSTGRES_PASSWORD: serve
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
