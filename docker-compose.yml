services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: serve
      POSTGRES_USER: serve
      POSTGRES_PASSWORD: serve
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serve -d serve"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./back-end
    command: sh -c "python manage.py migrate && python manage.py seed && python manage.py runserver 0.0.0.0:8000"
    environment:
      SECRET_KEY: dev-compose-secret
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,api
      POSTGRES_DB: serve
      POSTGRES_USER: serve
      POSTGRES_PASSWORD: serve
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./back-end:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./front-end
    command: npm start -- --host 0.0.0.0 --port 4200
    volumes:
      - ./front-end:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - api

volumes:
  postgres_data:
  media_data:
  frontend_node_modules:
